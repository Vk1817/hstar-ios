<!DOCTYPE html>
<html lang="en">
<head>
  <title>Fox Cricket</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="referrer" content="no-referrer"/>

  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css"/>

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr JS -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      width: 100%;
      background: #000;
      overflow: hidden;
    }

    .video-container {
      position: fixed;
      inset: 0;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .plyr {
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="video-container">
  <video autoplay playsinline muted id="player" controls preload="metadata"></video>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const video = document.getElementById("player");
  const source = "https://l.ratanliton2.workers.dev/?url=https://game.denver69.fun/Series/willow_hin.m3u8";

  const defaultOptions = {
    autoplay: true,
    controls: [
      'play','rewind','fast-forward','progress','current-time',
      'mute','volume','settings','fullscreen'
    ],
    settings: ['quality']
  };

  let player;

  function setupPlayer(hls, qualities = []) {
    player = new Plyr(video, {
      ...defaultOptions,
      quality: qualities.length ? {
        default: qualities[0],
        options: qualities,
        forced: true,
        onChange: q => {
          hls.levels.forEach((level, index) => {
            if (level.height === q) hls.currentLevel = index;
          });
        }
      } : {}
    });

    // 🔁 AUTO RESUME
    setInterval(() => {
      if (video.paused && video.readyState > 2) {
        video.play().catch(()=>{});
      }
    }, 3000);

    // 🔊 AUTO UNMUTE (first tap)
    const unmute = () => {
      video.muted = false;
      video.volume = 1;
      document.removeEventListener("click", unmute);
      document.removeEventListener("touchstart", unmute);
    };

    document.addEventListener("click", unmute);
    document.addEventListener("touchstart", unmute);

    // 🎯 TAP ANYWHERE → FULLSCREEN (like earlier player)
    video.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        video.requestFullscreen().catch(()=>{});
      }
    });
  }

  if (Hls.isSupported()) {
    const hls = new Hls({
      autoStartLoad: true,
      maxBufferLength: 10,
      maxMaxBufferLength: 20
    });

    hls.loadSource(source);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
      const qualities = data.levels.map(l => l.height).sort((a,b)=>b-a);
      video.play().catch(()=>{});
      setupPlayer(hls, qualities);
    });

    // 🔥 AUTO RECOVER
    hls.on(Hls.Events.ERROR, (_, data) => {
      if (data.fatal) {
        hls.startLoad();
      }
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = source;
    video.addEventListener("loadedmetadata", () => {
      video.play().catch(()=>{});
      setupPlayer(null);
    });
  }

});
</script>

</body>
</html>

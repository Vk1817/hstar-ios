<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jio Hotstar iOS</title>

  <!-- Plyr UI -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.css" />

  <!-- HLS.js -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <!-- Plyr -->
  <script src="https://cdn.jsdelivr.net/npm/plyr@3.7.8/dist/plyr.polyfilled.js"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100vh;
      background: black;
    }
  </style>
</head>

<body>

<video id="player" autoplay playsinline muted controls></video>

<script>
const video = document.getElementById("player");
const source = "https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8";

let player;

/* =========================
   SETUP PLAYER
========================= */
function initPlayer(hls, qualities = []) {
  player = new Plyr(video, {
    autoplay: true,
    controls: [
      'play','progress','current-time',
      'mute','volume','fullscreen'
    ],
    settings: ['quality'],
    quality: qualities.length ? {
      default: qualities[0],
      options: qualities,
      forced: true,
      onChange: q => {
        if (hls) {
          hls.levels.forEach((level, i) => {
            if (level.height === q) hls.currentLevel = i;
          });
        }
      }
    } : {}
  });

  video.play().catch(()=>{});
}

/* =========================
   NATIVE FIRST (IMPORTANT)
========================= */
video.src = source;

/* =========================
   HLS SUPPORT
========================= */
if (Hls.isSupported()) {
  const hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true
  });

  hls.loadSource(source);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, (_, data) => {
    const qualities = data.levels.map(l => l.height).sort((a,b)=>b-a);
    initPlayer(hls, qualities);
  });

  /* ERROR FIX */
  hls.on(Hls.Events.ERROR, function (_, data) {
    if (data.fatal) {
      console.log("Fallback to native");
      video.src = source;
    }
  });

} else if (video.canPlayType("application/vnd.apple.mpegurl")) {
  video.addEventListener("loadedmetadata", () => {
    initPlayer(null);
  });
}

/* =========================
   AUTO RESUME
========================= */
setInterval(()=>{
  if(video.paused && video.readyState>2){
    video.play().catch(()=>{});
  }
},4000);

/* =========================
   AUTO UNMUTE
========================= */
function unmute() {
  video.muted = false;
  video.volume = 1;
  document.removeEventListener("click", unmute);
  document.removeEventListener("touchstart", unmute);
}
document.addEventListener("click", unmute);
document.addEventListener("touchstart", unmute);

</script>

</body>
</html>

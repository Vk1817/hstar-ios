<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Player</title>

<style>
body { margin:0; background:black; }
video { width:100%; height:100vh; background:black; }
</style>
</head>

<body>

<video controls autoplay playsinline muted>
  <source src="https://dillzy-stream.sayanwork-studioo.workers.dev/live/abc123.m3u8" type="application/x-mpegURL">
</video>

<script>
const video = document.querySelector("video");

/* Force play */
video.play().catch(()=>{});

/* Auto resume */
setInterval(()=>{
  if(video.paused && video.readyState>2){
    video.play().catch(()=>{});
  }
},3000);

/* Unmute on click */
document.addEventListener("click", ()=>{
  video.muted = false;
});
</script>

</body>
</html>
